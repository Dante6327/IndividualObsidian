spring:
  application:
    name: IndividualObsidian

  datasource:
    url: jdbc:postgresql://localhost:5432/individualobsidian_db
    username: io_user
    password: io_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect